<!doctype html>
<!-- OBS launcher: loads the break board in stream-display mode with its URL params.
     OBS "local file" browser sources can't carry query strings, so this wrapper does. -->
<meta charset="utf-8">
<title>Pack Mama — OBS Stream Board</title>
<style>html,body{margin:0;padding:0;background:transparent;overflow:hidden}
iframe{display:block;width:1080px;height:1920px;border:0;background:transparent}</style>
<iframe src="index.html?view=stream&room=packmama" allowtransparency="true"></iframe>
